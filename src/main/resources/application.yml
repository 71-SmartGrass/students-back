server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/students?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis:
    mapper-locations: classpath:mapper/*.xml
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.studentsback.mapper: debug
    com.example.studentsback.service: debug
    com.example.studentsback.controller: debug
